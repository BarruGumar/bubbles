providers = ["php", "node"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan optimize && SERVER_NAME=http://:${PORT:-8000} php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
